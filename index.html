<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Flanked</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <!-- Google Fonts for Icons and Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <style>
        :root {
            --yt-main-bg: #0f0f0f;
            --yt-sidebar-bg: #0f0f0f;
            --yt-card-hover: #272727;
            --yt-text-main: #f1f1f1;
            --yt-text-sub: #aaa;
            --yt-border: #303030;
            --yt-red: #ff0000;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            display: inline-block;
            -webkit-font-smoothing: antialiased;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Roboto", "Arial", sans-serif;
        }

        body {
            background-color: var(--yt-main-bg);
            color: var(--yt-text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            height: 56px;
            background-color: var(--yt-main-bg);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-icon {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .menu-icon:hover { background-color: #272727; }

        .logo-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .logo-img {
            width: 28px;
            height: 20px;
            background-color: var(--yt-red);
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 4px;
        }

        .logo-img::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 8px solid #fff;
            margin-left: 2px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        .logo-text span {
            font-size: 11px;
            color: var(--yt-text-sub);
            margin-left: 4px;
            font-weight: 400;
        }

        .center-section {
            display: flex;
            align-items: center;
            width: 40%;
            max-width: 640px;
        }

        .search-box {
            display: flex;
            flex: 1;
            background-color: #121212;
            border: 1px solid var(--yt-border);
            border-radius: 40px 0 0 40px;
            padding-left: 16px;
            height: 40px;
            align-items: center;
        }

        .search-box input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 16px;
        }

        .search-btn {
            background-color: #222222;
            border: 1px solid var(--yt-border);
            border-left: none;
            border-radius: 0 40px 40px 0;
            width: 64px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .app-body {
            display: flex;
            flex: 1;
            margin-top: 56px;
            overflow: hidden;
        }

        aside {
            width: 240px;
            background-color: var(--yt-sidebar-bg);
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-row {
            display: flex;
            align-items: center;
            height: 40px;
            padding: 0 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--yt-text-main);
            gap: 24px;
        }

        .sidebar-row:hover, .sidebar-row.active { background-color: #272727; }
        hr { border: none; border-top: 1px solid var(--yt-border); margin: 12px 0; }

        main {
            flex: 1;
            background-color: var(--yt-main-bg);
            padding: 24px;
            overflow-y: auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px 16px;
        }

        .video-card { display: flex; flex-direction: column; cursor: pointer; }

        .thumb-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #272727;
            border-radius: 12px;
            overflow: hidden;
        }

        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .video-meta-block { display: flex; margin-top: 12px; gap: 12px; }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #282828;
            flex-shrink: 0;
        }

        .card-details { display: flex; flex-direction: column; }

        .video-title-line {
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            color: var(--yt-text-main);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 4px;
        }

        .metadata-line { font-size: 12px; color: var(--yt-text-sub); line-height: 18px; }

        .theater-layout {
            display: none;
            grid-template-columns: 1fr;
            gap: 24px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .player-stage video { width: 100%; aspect-ratio: 16 / 9; background-color: #000; border-radius: 12px; }
        .stage-title { font-size: 20px; font-weight: 700; margin: 12px 0 8px 0; }
        .owner-details { display: flex; align-items: center; padding-bottom: 16px; border-bottom: 1px solid var(--yt-border); }
        .channel-identity { display: flex; align-items: center; gap: 12px; }
        .channel-identity .title { font-size: 16px; font-weight: 500; }

        .hidden { display: none !important; }
        .active-grid { display: grid !important; }
    </style>
</head>
<body>

    <header>
        <div class="left-section">
            <div class="menu-icon"><span class="material-symbols-outlined">menu</span></div>
            <div class="logo-container" onclick="resetToHome()">
                <div class="logo-img"></div>
                <div class="logo-text">YouTube<span>Flanked</span></div>
            </div>
        </div>
        <div class="center-section">
            <div class="search-box">
                <input type="text" id="query-input" placeholder="Search" onkeydown="if(event.key==='Enter')executeSearch()">
            </div>
            <button class="search-btn" onclick="executeSearch()"><span class="material-symbols-outlined">search</span></button>
        </div>
        <div style="width: 40px;"></div>
    </header>

    <div class="app-body">
        <aside>
            <div class="sidebar-row active" onclick="resetToHome()">
                <span class="material-symbols-outlined">home</span><span>Home</span>
            </div>
            <div class="sidebar-row"><span class="material-symbols-outlined">play_arrow</span><span>Shorts</span></div>
            <div class="sidebar-row"><span class="material-symbols-outlined">subscriptions</span><span>Subscriptions</span></div>
            <hr>
            <div class="sidebar-row"><span class="material-symbols-outlined">video_library</span><span>Library</span></div>
        </aside>

        <main>
            <div id="home-view" class="video-grid"></div>
            <div id="theatre-view" class="theater-layout">
                <div class="player-stage">
                    <video id="html5-video-node" controls autoplay></video>
                    <div id="video-title-node" class="stage-title">Loading...</div>
                    <div class="owner-details">
                        <div class="channel-identity">
                            <div class="channel-avatar"></div>
                            <div class="title" id="video-channel-node">Channel</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // High-performance public Invidious instance with wide-open CORS permissions
        const INVIDIOUS_API = "https://invidious.perennialte.ch";

        async function fetchSystemTrending() {
            try {
                const response = await fetch(`${INVIDIOUS_API}/api/v1/trending?region=US`);
                const items = await response.json();
                buildVideoCatalog(items);
            } catch (error) {
                console.error("Failed fetching layout catalog:", error);
            }
        }

        async function executeSearch() {
            const query = document.getElementById('query-input').value.trim();
            if (!query) return;
            try {
                const response = await fetch(`${INVIDIOUS_API}/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
                const items = await response.json();
                resetToHome();
                buildVideoCatalog(items);
            } catch (error) {
                console.error("Search call failed:", error);
            }
        }

        function buildVideoCatalog(dataset) {
            const container = document.getElementById('home-view');
            container.innerHTML = ""; 

            dataset.forEach(item => {
                const cardNode = document.createElement('div');
                cardNode.className = 'video-card';
                cardNode.onclick = () => instantiateStreamPlayback(item.videoId, item.title, item.author);

                // Safely find the highest resolution thumbnail provided by the API
                const thumbUrl = item.videoThumbnails && item.videoThumbnails.length > 0 
                    ? item.videoThumbnails.find(t => t.quality === 'medium' || t.quality === 'high')?.url || item.videoThumbnails[0].url
                    : `https://invidious.perennialte.ch/vi/${item.videoId}/mqdefault.jpg`;

                cardNode.innerHTML = `
                    <div class="thumb-wrapper">
                        <img src="${thumbUrl}" alt="Thumbnail" loading="lazy">
                    </div>
                    <div class="video-meta-block">
                        <div class="channel-avatar"></div>
                        <div class="card-details">
                            <div class="video-title-line">${item.title}</div>
                            <div class="metadata-line">
                                <div class="channel-name-line">${item.author}</div>
                                <span>${item.viewCount?.toLocaleString() || '0'} views</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(cardNode);
            });
        }

        function instantiateStreamPlayback(videoId, title, author) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('theatre-view').classList.add('active-grid');

            document.getElementById('video-title-node').innerText = title;
            document.getElementById('video-channel-node').innerText = author;

            const mediaNode = document.getElementById('html5-video-node');
            
            // Invidious allows streaming natively from their playback endpoints with 0 ads
            mediaNode.src = `${INVIDIOUS_API}/latest_version?id=${videoId}&itag=22`;
            mediaNode.load();
        }

        function resetToHome() {
            document.getElementById('theatre-view').classList.remove('active-grid');
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('html5-video-node').pause();
        }

        window.onload = fetchSystemTrending;
    </script>
</body>
</html>
